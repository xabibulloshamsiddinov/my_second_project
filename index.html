<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xabibulloning Web Sahifasi</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(0, 0, 0, 0.35);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      max-width: 700px;
      width: 90%;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
    }

    a {
      color: #ffd700;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #ffd700;
      color: #000;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffcc00;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Salom, bu Shamsiddinov Xabibulloning web sahifasi</h1>
    <p>
      Mening sahifamga xush kelibsiz.
    </p>
    <p>
      Men bilan Telegram orqali bog‘lanishingiz mumkin:
      <a href="https://t.me/khabib0609" target="_blank">@khabib0609</a>
    </p>
    <a class="btn" href="https://t.me/khabib0609" target="_blank">Contact via Telegram</a>
  </div>
</body>
</html>
