<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xabibullo | Web Sahifa</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      color: #00ffff;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 50, 0.7);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 25px #00ffff;
      width: 80%;
      max-width: 700px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      text-shadow: 0 0 10px #00ffff;
    }

    p {
      font-size: 20px;
    }

    a {
      color: #00ffff;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-shadow: 0 0 10px #00ffff;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border: 2px solid #00ffff;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ffff;
      color: black;
      box-shadow: 0 0 15px #00ffff;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>Salom, bu Shamsiddinov Xabibulloning web sahifasi</h1>
  <p>Mening sahifamga xush kelibsiz.</p>
  <p>
    Men bilan Telegram orqali bog‘laning:
    <a href="https://t.me/khabib0609" target="_blank">@khabib0609</a>
  </p>
  <a class="btn" href="https://t.me/khabib0609" target="_blank">Contact via Telegram</a>
</div>

<script>
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "01";
  const fontSize = 16;
  const columns = canvas.width / fontSize;

  const drops = [];

  for (let i = 0; i < columns; i++) {
    drops[i] = 1;
  }

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffff";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters.charAt(Math.floor(Math.random() * letters.length));
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
        drops[i] = 0;

      drops[i]++;
    }
  }

  setInterval(draw, 35);
</script>

</body>
</html>
